    /* RESET */
    * {

        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;

        color: white;
    }

    /* BACKGROUND ANIMATION */
    body {

    }

    .bg-animation {

        width: 100%;

        background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #6366f1);
        background-size: 400% 400%;

        z-index: -1;
    }

    @keyframes gradientBG {

    }

    /* NAVBAR */
    .navbar {
        position: sticky;

    }

        color: white;
        transition: all 0.3s ease;
    }

    .navbar ul {
        display: flex;
        gap: 20px;
        list-style: none;
    }

    .navbar li {
        position: relative;
    }

    .navbar li a {
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    .navbar li a:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
    }

    .navbar li a.active {
        background: rgba(14, 165, 233, 0.3);
        border: 1px solid rgba(14, 165, 233, 0.5);
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
    }

    .navbar li a.active::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 6px solid #0ea5e9;
    }

    /* SECTIONS */
    main {

        margin: 0 auto;
        padding: 60px 40px;
    }

    h1, h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    /* SEARCH BOX */

        padding: 30px;
        border-radius: 15px;
        margin-bottom: 30px;
    }

    .search-box {

        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
    }

        border-radius: 8px;
        background: rgba(255,255,255,0.2);
        color: white;
        font-size: 16px;
        min-width: 200px;
    }

    .search-box input::placeholder {
        color: rgba(255,255,255,0.7);
    }

    .search-box button {
        padding: 12px 30px;
        border: none;
        background: #0ea5e9;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        color: white;
        font-size: 16px;
        font-weight: bold;
    }

    .search-box button:hover {
        box-shadow: 0 0 20px #0ea5e9;
        transform: translateY(-3px);
    }

    /* DATA TABLE */
    .data-table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        overflow: hidden;
    }

    .data-table th, .data-table td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .data-table th {
        background: rgba(14, 165, 233, 0.3);
        font-weight: bold;
    }

    .data-table tr:hover {

    .blood-group {

        border-radius: 20px;
        background: rgba(239, 68, 68, 0.3);

        padding: 30px;
        background: rgba(0,0,0,0.4);
    }

        justify-content: center;
    }

    footer nav ul li {

// Display all data on page load
function displayData(data) {
    const tableBody = document.getElementById('dataTable');
    tableBody.innerHTML = '';
    
    if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="no-data">No donors found matching your search criteria.</td></tr>';
        return;
    }
    
    data.forEach(donor => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${donor.name}</td>
            <td><span class="blood-group">${donor.bloodGroup}</span></td>
            <td>${donor.phone}</td>
            <td>${donor.village}</td>
        `;
        tableBody.appendChild(row);
    });
}

// Search functionality
function searchData() {
    const searchName = document.getElementById('searchName').value.toLowerCase();
    const bloodGroup = document.getElementById('bloodGroup').value;
    const searchVillage = document.getElementById('searchVillage').value.toLowerCase();
    
    const filteredData = bloodDonors.filter(donor => {
        const matchName = donor.name.toLowerCase().includes(searchName);
        const matchBloodGroup = bloodGroup === '' || donor.bloodGroup === bloodGroup;
        const matchVillage = donor.village.toLowerCase().includes(searchVillage);
        
        return matchName && matchBloodGroup && matchVillage;
    });
    
    displayData(filteredData);
}

// navbar active state
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const navLinks = document.querySelectorAll('.nav-link');
    
    navLinks.forEach(link => {
        link.classList.remove('active');
        const linkPage = link.getAttribute('href');
        if (linkPage === currentPage || (currentPage === '' && linkPage === 'index.html')) {
            link.classList.add('active');
        }
    });

    // smooth page transition
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            const targetPage = this.getAttribute('href');
            if (targetPage !== currentPage) {
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.3s ease';
                setTimeout(() => {
                    window.location.href = targetPage;
                }, 300);
            }
        });
    });

    // Display initial data
    displayData(bloodDonors);
});
